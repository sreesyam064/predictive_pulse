services:
  -type: web
    name: predictive-pulse
    env: docker
    plan: free

    autoDeploy: false

    healthCheckPath: /health

    envVars:
      - key: PORT
        value: 5000
      - key: FLASK_ENV
        value: production

      - key: FLASK_DEBUG
        value: "false"

      - key: PYTHONUNBUFFERED
        value: "1"   