# version: "3.9"
services:

  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
    image: predictive-pulse:latest
    container_name: predictive_pulse_app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      - SECRET_KEY=${SECRET_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - model_data:/app/models
      - app_data:/app/data

  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: predictive-pulse:dev
    container_name: predictive_pulse_dev
    ports:
      - "5001:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=True
      - SECRET_KEY=${SECRET_KEY} 
    volumes:
    - .:/app
    - model_data:/app/models
    profiles:
      - dev
    command: ["python", "app.py"]

volumes:
  model_data:
  app_data: